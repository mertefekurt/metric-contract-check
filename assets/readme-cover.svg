<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Metric Contract Check cover">

  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#84cc16" stop-opacity=".34"/>
      <stop offset=".54" stop-color="#0f1f17" stop-opacity="0"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity=".30"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="5" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .10"/></feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="30" fill="#0f1f17"/>
  <rect width="1280" height="420" rx="30" fill="url(#g)" filter="url(#grain)"/>

  <circle cx="1044" cy="182" r="178" fill="#84cc16" opacity=".14"/>
  <circle cx="1138" cy="286" r="92" fill="#14b8a6" opacity=".18"/>
  <rect x="86" y="86" width="560" height="248" rx="26" fill="#0f1f17" opacity=".68" stroke="#84cc16" stroke-width="4"/>
  <text x="124" y="178" fill="#f7fee7" font-family="Sora, ui-sans-serif, system-ui" font-size="60" font-weight="850">Metric Contract Check</text>
  <text x="128" y="234" fill="#bbf7d0" font-family="Sora, ui-sans-serif, system-ui" font-size="23">Validate metric names and event contracts before...</text>
  <text x="128" y="292" fill="#14b8a6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="800">API CONTRACTS</text>
